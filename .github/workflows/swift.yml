name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Generate Secrets.xcconfig
      env:
        CAPTAIN_API_KEY: ${{ secrets.CAPTAIN_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        cat > Configuration/Secrets.xcconfig << 'XCEOF'
        CAPTAIN_API_KEY = ${CAPTAIN_API_KEY}
        SUPABASE_URL = ${SUPABASE_URL}
        SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY}
        XCEOF
        envsubst < Configuration/Secrets.xcconfig > Configuration/Secrets.xcconfig.tmp
        mv Configuration/Secrets.xcconfig.tmp Configuration/Secrets.xcconfig

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

    - name: Build
      run: |
        xcodebuild build \
          -project AiQo.xcodeproj \
          -scheme AiQo \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          | tail -20
