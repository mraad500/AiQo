name: Swift

on:
  push:
    branches: [ "main", "release/**" ]
  pull_request:
    branches: [ "main", "release/**" ]

jobs:
  build:
    # AiQo targets iOS 26.2 (IPHONEOS_DEPLOYMENT_TARGET = 26.2) and uses
    # iOS-26-only frameworks (AlarmKit, FoundationModels), so it can ONLY be
    # built with Xcode 26 / the iOS 26 SDK. The macOS 26 image ships that
    # toolchain + matching simulators. (The old pin to Xcode 16.3 / iPhone 16
    # failed: "iOS 18.4 is not installed" — that SDK can't build an iOS 26 app.)
    runs-on: macos-26

    steps:
    - uses: actions/checkout@v4

    - name: Generate Secrets.xcconfig
      env:
        CAPTAIN_API_KEY: ${{ secrets.CAPTAIN_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      run: |
        cat > Configuration/Secrets.xcconfig << 'XCEOF'
        CAPTAIN_API_KEY = ${CAPTAIN_API_KEY}
        SUPABASE_URL = ${SUPABASE_URL}
        SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY}
        XCEOF
        envsubst < Configuration/Secrets.xcconfig > Configuration/Secrets.xcconfig.tmp
        mv Configuration/Secrets.xcconfig.tmp Configuration/Secrets.xcconfig

    - name: Select newest installed Xcode
      run: |
        set -euo pipefail
        # Pick the highest-versioned Xcode present on the runner (robust to image
        # changes), falling back to the default. Must resolve to Xcode 26+.
        XC="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)"
        if [ -z "${XC}" ]; then XC="/Applications/Xcode.app"; fi
        echo "Selecting ${XC}"
        sudo xcode-select -s "${XC}"
        xcodebuild -version

    - name: Pick an iOS 26 simulator
      id: sim
      run: |
        set -euo pipefail
        # Prefer an available iPhone on an iOS 26+ runtime (matches the build's
        # deployment target); fall back to any available iPhone.
        SIM_ID="$(xcrun simctl list devices available -j | jq -r '
          [ .devices | to_entries[]
            | select(.key | test("SimRuntime.iOS-2[6-9]"))
            | .value[] | select(.name | startswith("iPhone")) ]
          | last.udid // empty')"
        if [ -z "${SIM_ID}" ]; then
          SIM_ID="$(xcrun simctl list devices available -j | jq -r '
            [ .devices[][] | select(.name | startswith("iPhone")) ] | last.udid // empty')"
        fi
        echo "Selected simulator: ${SIM_ID}"
        echo "sim_id=${SIM_ID}" >> "$GITHUB_OUTPUT"

    - name: Build for testing
      run: |
        set -o pipefail
        # Generic simulator destination: builds against the iOS 26 Simulator SDK
        # without needing a specific booted device/runtime present.
        xcodebuild build-for-testing \
          -project AiQo.xcodeproj \
          -scheme AiQo \
          -destination 'generic/platform=iOS Simulator' \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          | tail -40

    - name: Test
      run: |
        set -o pipefail
        xcodebuild test-without-building \
          -project AiQo.xcodeproj \
          -scheme AiQo \
          -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.sim_id }}" \
          -only-testing:AiQoTests \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          | tail -60
