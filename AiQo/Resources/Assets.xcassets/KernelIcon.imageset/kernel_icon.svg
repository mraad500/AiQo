<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B7E5D2" stop-opacity="0.55"/>
      <stop offset="48%" stop-color="#B7E5D2" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#B7E5D2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloSoft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B7E5D2" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#B7E5D2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#B7E5D2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="38%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#E9FCF5"/>
      <stop offset="42%" stop-color="#C8F0DF"/>
      <stop offset="100%" stop-color="#5ECDB7"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B7E5D2" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#B7E5D2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2DCA6"/>
      <stop offset="100%" stop-color="#E0BD74"/>
    </linearGradient>
    <linearGradient id="tileBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5FBF8"/>
      <stop offset="100%" stop-color="#DCEEE6"/>
    </linearGradient>
  </defs>

  <circle cx="512" cy="512" r="474" fill="url(#halo)"/>

  <!-- orbital rings (atom / nucleus) -->
  <g stroke-linecap="round">
    <ellipse cx="512" cy="512" rx="402" ry="150" stroke="#7FCBB4" stroke-width="15" opacity="0.92"/>
    <ellipse cx="512" cy="512" rx="402" ry="150" transform="rotate(60 512 512)" stroke="#E6CB93" stroke-width="15" opacity="0.92"/>
    <ellipse cx="512" cy="512" rx="402" ry="150" transform="rotate(120 512 512)" stroke="#8FD3BE" stroke-width="15" opacity="0.88"/>
  </g>

  <!-- charge arc (energy / shahn) -->
  <circle cx="512" cy="512" r="430" stroke="url(#arc)" stroke-width="24" stroke-linecap="round"
          stroke-dasharray="1640 2700" transform="rotate(130 512 512)" opacity="0.92"/>

  <!-- electrons on the orbits -->
  <circle cx="914" cy="512" r="25" fill="#5ECDB7"/>
  <circle cx="311" cy="164" r="25" fill="#E0BD74"/>
  <circle cx="311" cy="860" r="22" fill="#7FCBB4"/>

  <!-- glowing core -->
  <circle cx="512" cy="512" r="152" fill="url(#coreGlow)"/>
  <circle cx="512" cy="512" r="92" fill="url(#core)"/>
  <circle cx="487" cy="487" r="25" fill="#FFFFFF" opacity="0.72"/>
</svg>